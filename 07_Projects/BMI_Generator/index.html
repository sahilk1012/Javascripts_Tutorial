<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>BMI CALCULATOR</title>
</head>
<body>
    <div class="main">
        
        <div class="title"><b>BMI CALCULATOR</b></div>

        <form>
        <div class="inputbox" >
            <span class="inp">Height in CM:</span>
            <input id="height" type="text">
        </div>
        <div class="inputbox" >
            <span class="inp">Weight in KG:</span>
            <input id="weight" type="text">
        </div>
        <div><button>Calculate</button></div>
        </form>
        <div class="results"></div>

        <div class="scnd_last"><b>BMI WEIGHT GUIDE</b></div>
        <div class="last" style="color: white;">Under Weight = Less than 18.6</div>
        <div class="last">Normal Range = 18.6 and 24.9</div>
        <div class="last">Overweight = Greater than 24.9 </div>
    </div>




    <script src="script.js"></script>
</body>
</html>
